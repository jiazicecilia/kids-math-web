<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>佐佐的40以内加减法</title>
  <style>
    :root {
      --ink: #233142;
      --muted: #667085;
      --paper: #fffaf0;
      --panel: #ffffff;
      --sky: #d9f3ff;
      --mint: #b8efd5;
      --sun: #ffd166;
      --coral: #ff7a66;
      --blue: #3777c8;
      --green: #2f9e6d;
      --purple: #8b5cf6;
      --pink: #ff8cc6;
      --line: rgba(35, 49, 66, 0.12);
      --shadow: 0 18px 45px rgba(40, 61, 91, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(255, 209, 102, 0.5), transparent 24rem),
        radial-gradient(circle at 92% 18%, rgba(255, 140, 198, 0.38), transparent 18rem),
        radial-gradient(circle at 42% 95%, rgba(139, 92, 246, 0.18), transparent 20rem),
        linear-gradient(145deg, var(--sky), var(--paper) 48%, #e9f8ef);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
      z-index: 1;
    }

    .sky-decoration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-shape {
      position: absolute;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      color: rgba(35, 49, 66, 0.62);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 32px rgba(40, 61, 91, 0.08);
      font-size: 1.8rem;
      font-weight: 900;
      animation: floaty 7s ease-in-out infinite;
    }

    .floating-shape:nth-child(1) {
      left: 4vw;
      top: 18vh;
      background: rgba(255, 209, 102, 0.52);
    }

    .floating-shape:nth-child(2) {
      right: 5vw;
      top: 46vh;
      background: rgba(184, 239, 213, 0.6);
      animation-delay: -2s;
    }

    .floating-shape:nth-child(3) {
      left: 8vw;
      bottom: 12vh;
      background: rgba(255, 140, 198, 0.44);
      animation-delay: -4s;
    }

    .animal-cloud {
      position: absolute;
      right: 1.5vw;
      bottom: 3vh;
      width: min(230px, 28vw);
      opacity: 0.22;
      filter: drop-shadow(0 18px 24px rgba(40, 61, 91, 0.14));
      animation: floaty 8s ease-in-out infinite;
    }

    .animal-sticker {
      position: absolute;
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 28px rgba(40, 61, 91, 0.08);
      font-size: 2rem;
      animation: floaty 6.5s ease-in-out infinite;
    }

    .animal-sticker.dog {
      right: 8vw;
      top: 16vh;
    }

    .animal-sticker.rabbit {
      left: 2.5vw;
      top: 48vh;
      animation-delay: -2.5s;
    }

    .animal-sticker.panda {
      right: 3vw;
      top: 70vh;
      animation-delay: -4s;
    }

    @keyframes floaty {
      0%,
      100% {
        transform: translateY(0) rotate(-4deg);
      }

      50% {
        transform: translateY(-14px) rotate(5deg);
      }
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(240px, 0.8fr);
      align-items: center;
      gap: 26px;
      min-height: 210px;
      padding: 26px clamp(18px, 3vw, 36px);
      border: 2px solid rgba(255, 255, 255, 0.75);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .hero-badges span {
      padding: 8px 12px;
      border-radius: 999px;
      color: #28445f;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(35, 49, 66, 0.1);
      font-weight: 900;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 38rem;
      margin: 14px 0 0;
      color: #3f5368;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    .mascot-wrap {
      display: flex;
      justify-content: center;
      min-width: 0;
    }

    .mascot {
      width: min(270px, 70vw);
      aspect-ratio: 1;
      object-fit: contain;
      filter: drop-shadow(0 18px 22px rgba(35, 49, 66, 0.16));
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .practice,
    .side {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 12px 32px rgba(40, 61, 91, 0.1);
    }

    .practice {
      padding: clamp(18px, 3vw, 28px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, auto));
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .control-group {
      display: grid;
      gap: 7px;
    }

    .control-group:nth-child(3) {
      grid-column: 1 / -1;
    }

    .control-label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .segmented {
      display: inline-grid;
      grid-auto-flow: column;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfd;
    }

    .segmented button {
      min-width: 68px;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--ink);
      background: transparent;
      font-weight: 700;
    }

    .segmented button.is-active {
      color: #fff;
      background: var(--blue);
      box-shadow: 0 7px 16px rgba(55, 119, 200, 0.24);
    }

    .segmented button[data-difficulty].is-active {
      background: var(--purple);
      box-shadow: 0 7px 16px rgba(139, 92, 246, 0.22);
    }

    .segmented button[data-kind].is-active {
      background: var(--green);
      box-shadow: 0 7px 16px rgba(47, 158, 109, 0.22);
    }

    .problem-panel {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 178px;
      border: 2px dashed rgba(55, 119, 200, 0.28);
      border-radius: 8px;
      background:
        radial-gradient(circle at 92% 16%, rgba(255, 209, 102, 0.32), transparent 8rem),
        linear-gradient(90deg, rgba(184, 239, 213, 0.34), transparent 48%),
        #fff;
      overflow: hidden;
    }

    .problem-panel::before {
      content: "";
      position: absolute;
      left: -18px;
      right: -18px;
      bottom: -34px;
      height: 62px;
      border-radius: 50%;
      background: rgba(55, 119, 200, 0.1);
    }

    .type-pill {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 1;
      padding: 6px 10px;
      border-radius: 999px;
      color: #426079;
      background: rgba(255, 255, 255, 0.76);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .problem {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2vw, 18px);
      width: 100%;
      padding: 14px;
      font-size: clamp(3.4rem, 11vw, 7.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .problem span {
      min-width: 0;
    }

    .problem.story {
      max-width: 690px;
      font-size: clamp(1.55rem, 4.5vw, 2.8rem);
      line-height: 1.28;
      text-align: center;
    }

    .blank {
      display: inline-grid;
      place-items: center;
      min-width: 1.35em;
      min-height: 1.05em;
      padding: 0 0.16em;
      border-radius: 8px;
      color: var(--blue);
      background: rgba(255, 255, 255, 0.8);
      border: 4px dashed rgba(55, 119, 200, 0.32);
    }

    .answer-row {
      display: grid;
      grid-template-columns: minmax(90px, 160px) repeat(2, minmax(0, auto));
      gap: 10px;
      justify-content: center;
      margin: 20px 0 10px;
    }

    .answer-input {
      width: 100%;
      height: 56px;
      border: 2px solid rgba(35, 49, 66, 0.16);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      appearance: textfield;
      font-size: 1.9rem;
      font-weight: 900;
      text-align: center;
      outline: none;
    }

    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
    }

    .answer-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(55, 119, 200, 0.12);
    }

    .primary,
    .secondary {
      min-height: 56px;
      padding: 0 18px;
      border-radius: 8px;
      font-weight: 900;
    }

    .primary {
      color: #fff;
      background: var(--coral);
      box-shadow: 0 10px 18px rgba(255, 122, 102, 0.25);
    }

    .secondary {
      color: var(--ink);
      background: var(--sun);
    }

    .feedback {
      min-height: 36px;
      margin: 8px 0 16px;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 800;
      text-align: center;
    }

    .feedback.good {
      color: var(--green);
    }

    .feedback.try {
      color: #b95b42;
    }

    .number-pad {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .number-pad button {
      aspect-ratio: 1.25;
      min-height: 42px;
      border: 1px solid rgba(35, 49, 66, 0.1);
      border-radius: 8px;
      color: var(--ink);
      background: #f8fbfd;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .number-pad button:hover,
    .number-pad button:focus-visible {
      background: var(--mint);
      outline: none;
    }

    .hint {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: #fff7df;
    }

    .hint.is-visible {
      display: block;
    }

    .hint-title {
      margin-bottom: 10px;
      color: #6a4a00;
      font-weight: 900;
    }

    .dot-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin: 8px 0;
    }

    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.12);
    }

    .dot.added {
      background: var(--green);
    }

    .dot.taken {
      background: #cfd8e3;
      position: relative;
    }

    .dot.taken::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      top: 9px;
      height: 2px;
      background: #8b99a8;
      transform: rotate(-35deg);
    }

    .side {
      padding: 18px;
    }

    .task-box {
      margin-bottom: 16px;
      padding: 16px;
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 140, 198, 0.2), rgba(255, 255, 255, 0.74)),
        #fff;
      border: 1px solid var(--line);
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 900;
    }

    .task-goal {
      display: grid;
      grid-template-columns: minmax(70px, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .task-goal input {
      min-width: 0;
      height: 40px;
      border: 2px solid rgba(35, 49, 66, 0.14);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: #fff;
      font-weight: 900;
    }

    .task-goal button {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 8px;
      color: #fff;
      background: var(--purple);
      font-weight: 900;
    }

    .progress {
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(35, 49, 66, 0.1);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--coral), var(--sun), var(--green));
      transition: width 0.28s ease;
    }

    .task-text {
      margin: 8px 0 0;
      color: #4c6378;
      font-weight: 800;
      line-height: 1.45;
    }

    .checkin-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .checkin-pill {
      padding: 9px 6px;
      border-radius: 8px;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(35, 49, 66, 0.1);
      font-weight: 900;
    }

    .checkin-pill b {
      display: block;
      font-size: 1.35rem;
      line-height: 1;
    }

    .checkin-pill span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .milestones {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .milestone {
      min-height: 48px;
      padding: 8px 4px;
      border-radius: 8px;
      color: #77869a;
      background: rgba(255, 255, 255, 0.62);
      text-align: center;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .milestone.is-done {
      color: #7b4f00;
      background: var(--sun);
      box-shadow: inset 0 -3px 0 rgba(123, 79, 0, 0.12);
    }

    .calendar {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      background: #f8fbfd;
      border: 1px solid var(--line);
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .calendar-cell {
      display: grid;
      place-items: center;
      min-height: 31px;
      border-radius: 8px;
      color: #65758a;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .calendar-cell.weekday {
      color: #8b99a8;
      background: transparent;
      min-height: 22px;
      font-size: 0.72rem;
    }

    .calendar-cell.is-today {
      outline: 2px solid var(--blue);
      outline-offset: -2px;
    }

    .calendar-cell.is-done {
      color: #fff;
      background: var(--green);
      box-shadow: inset 0 -3px 0 rgba(35, 49, 66, 0.14);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 88px;
      padding: 14px;
      border-radius: 8px;
      background: #f8fbfd;
      border: 1px solid var(--line);
    }

    .stat b {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .badge-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255, 209, 102, 0.36), rgba(184, 239, 213, 0.44));
    }

    .badge-title {
      margin-bottom: 12px;
      font-weight: 900;
    }

    .stars {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .star {
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      color: #b0bdc9;
      font-size: 1.55rem;
      font-weight: 900;
    }

    .star.is-lit {
      color: #7b4f00;
      background: var(--sun);
      box-shadow: inset 0 -4px 0 rgba(123, 79, 0, 0.12);
    }

    .next-goal {
      margin: 12px 0 0;
      color: #4c6378;
      font-weight: 800;
      line-height: 1.5;
    }

    .history {
      margin-top: 16px;
    }

    .history h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f8fbfd;
      color: var(--muted);
      font-weight: 800;
    }

    .history-item.good {
      color: var(--green);
    }

    .history-item.try {
      color: #b95b42;
    }

    .reward {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(35, 49, 66, 0.28);
      z-index: 10;
    }

    .reward.is-visible {
      display: grid;
    }

    .reward-card {
      position: relative;
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 8px;
      text-align: center;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      animation: popIn 0.34s ease both;
      overflow: hidden;
    }

    .reward-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 209, 102, 0.42), transparent 7rem),
        radial-gradient(circle at 88% 28%, rgba(184, 239, 213, 0.58), transparent 8rem),
        linear-gradient(180deg, #fff, #f6fbff);
      z-index: -1;
    }

    .reward-stage {
      position: relative;
      height: 176px;
      margin-bottom: 14px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.86), transparent 6rem),
        linear-gradient(180deg, #eaf7ff 0 62%, #d8f2d8 62% 100%);
      overflow: hidden;
    }

    .reward[data-reward="ten"] .reward-stage {
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 209, 102, 0.66), transparent 7rem),
        linear-gradient(180deg, #fff1c7 0 62%, #d8f2d8 62% 100%);
    }

    .reward[data-reward="combo"] .reward-stage {
      background:
        radial-gradient(circle at 28% 18%, rgba(255, 140, 198, 0.5), transparent 7rem),
        radial-gradient(circle at 74% 14%, rgba(139, 92, 246, 0.32), transparent 7rem),
        linear-gradient(180deg, #edf2ff 0 62%, #e0f7e9 62% 100%);
    }

    .reward-sun {
      display: block;
      position: absolute;
      right: 24px;
      top: 18px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--sun);
      animation: spinStar 1.4s ease-in-out infinite;
    }

    .reward-animal {
      position: absolute;
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.76);
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 14px 24px rgba(40, 61, 91, 0.12);
      font-size: 2.75rem;
      animation: animalDance 4.2s ease-in-out both;
    }

    .reward-animal.dog {
      left: 48px;
      bottom: 24px;
    }

    .reward-animal.rabbit {
      left: 50%;
      margin-left: -36px;
      bottom: 38px;
      animation-delay: 0.18s;
    }

    .reward-animal.panda {
      right: 48px;
      bottom: 24px;
      animation-delay: 0.34s;
    }

    .reward[data-reward="ten"] .reward-animal {
      animation-name: animalParade;
    }

    .reward[data-reward="combo"] .reward-animal {
      animation-name: animalBounce;
    }

    .reward-star {
      position: absolute;
      color: #7b4f00;
      font-size: 1.8rem;
      animation: sparkle 4.2s ease-in-out both;
    }

    .reward-star:nth-child(5) {
      left: 28%;
      top: 26px;
    }

    .reward-star:nth-child(6) {
      right: 30%;
      top: 52px;
      animation-delay: 0.35s;
    }

    .reward-card h2 {
      margin: 0;
      font-size: 2rem;
    }

    .reward-card p {
      margin: 10px 0 18px;
      color: #4c6378;
      font-weight: 800;
      line-height: 1.6;
    }

    .reward-card button {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font-weight: 900;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      z-index: 11;
      animation: fall 4.2s ease-in forwards;
    }

    @keyframes popIn {
      from {
        transform: scale(0.86);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes spinStar {
      0%,
      100% {
        transform: rotate(-8deg) scale(1);
      }

      50% {
        transform: rotate(8deg) scale(1.08);
      }
    }

    @keyframes animalDance {
      0% {
        transform: translateY(36px) scale(0.65) rotate(-8deg);
        opacity: 0;
      }

      18% {
        transform: translateY(0) scale(1.05) rotate(5deg);
        opacity: 1;
      }

      34%,
      62% {
        transform: translateY(-16px) scale(1.05) rotate(-5deg);
      }

      48%,
      78% {
        transform: translateY(0) scale(1) rotate(6deg);
      }

      100% {
        transform: translateY(0) scale(1) rotate(0);
        opacity: 1;
      }
    }

    @keyframes animalParade {
      0% {
        transform: translateX(-90px) translateY(20px) scale(0.8);
        opacity: 0;
      }

      22%,
      64% {
        transform: translateX(0) translateY(-12px) scale(1.05);
        opacity: 1;
      }

      42%,
      82% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes animalBounce {
      0% {
        transform: translateY(30px) scale(0.72);
        opacity: 0;
      }

      18% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      32%,
      54%,
      76% {
        transform: translateY(-24px) scale(1.08);
      }

      43%,
      65%,
      88%,
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes sparkle {
      0%,
      100% {
        transform: scale(0.7) rotate(0);
        opacity: 0.35;
      }

      40%,
      75% {
        transform: scale(1.35) rotate(24deg);
        opacity: 1;
      }
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(680deg);
        opacity: 0;
      }
    }

    @media (max-width: 860px) {
      .hero,
      .workspace {
        grid-template-columns: 1fr;
      }

      .hero {
        text-align: center;
      }

      .hero p {
        margin-left: auto;
        margin-right: auto;
      }

      .side {
        order: -1;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1120px);
        padding: 10px 0;
      }

      .hero {
        padding: 18px;
      }

      .toolbar,
      .answer-row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .segmented {
        grid-auto-flow: row;
        grid-template-columns: repeat(2, 1fr);
      }

      .segmented button {
        min-width: 0;
      }

      .number-pad {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="sky-decoration" aria-hidden="true">
    <span class="floating-shape">+</span>
    <span class="floating-shape">7</span>
    <span class="floating-shape">−</span>
    <span class="animal-sticker dog">🐕</span>
    <span class="animal-sticker rabbit">🐰</span>
    <span class="animal-sticker panda">🐼</span>
    <img class="animal-cloud" src="assets/animal-friends.png" alt="">
  </div>

  <main class="app">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">佐佐的数学天地</h1>
        <p>每天完成一点点任务，练普通算式、找缺口、比大小和故事题，让40以内加减法变成小闯关。</p>
        <div class="hero-badges" aria-hidden="true">
          <span>每日任务</span>
          <span>三档难度</span>
          <span>答对有奖励</span>
        </div>
      </div>
      <div class="mascot-wrap" aria-hidden="true">
        <img class="mascot" src="assets/math-mascot.png" alt="">
      </div>
    </section>

    <section class="workspace" aria-label="练习区">
      <div class="practice">
        <div class="toolbar">
          <div class="control-group">
            <div class="control-label">难度</div>
            <div class="segmented" aria-label="选择难度">
              <button type="button" class="is-active" data-difficulty="easy">启航</button>
              <button type="button" data-difficulty="medium">巡航</button>
              <button type="button" data-difficulty="hard">冲刺</button>
            </div>
          </div>
          <div class="control-group">
            <div class="control-label">运算</div>
            <div class="segmented" aria-label="选择运算">
              <button type="button" class="is-active" data-mode="mix">混合</button>
              <button type="button" data-mode="add">加法</button>
              <button type="button" data-mode="sub">减法</button>
            </div>
          </div>
          <div class="control-group">
            <div class="control-label">题型</div>
            <div class="segmented" aria-label="选择题型">
              <button type="button" class="is-active" data-kind="mix">随机</button>
              <button type="button" data-kind="normal">算式</button>
              <button type="button" data-kind="missing">填空</button>
              <button type="button" data-kind="compare">比大小</button>
              <button type="button" data-kind="story">故事</button>
            </div>
          </div>
        </div>

        <div class="problem-panel">
          <div class="type-pill" id="typePill">普通算式</div>
          <div class="problem" id="problemText" aria-live="polite">
            <span id="leftNumber">8</span>
            <span id="operator">+</span>
            <span id="rightNumber">5</span>
            <span>=</span>
            <span>?</span>
          </div>
        </div>

        <div class="answer-row">
          <input
            class="answer-input"
            id="answerInput"
            type="text"
            inputmode="numeric"
            aria-label="答案"
            autocomplete="off"
          >
          <button class="primary" type="button" id="checkButton">确认</button>
          <button class="secondary" type="button" id="hintButton">提示</button>
        </div>

        <div class="feedback" id="feedback" aria-live="polite">准备好了吗？</div>

        <div class="number-pad" id="numberPad" aria-label="数字按钮"></div>

        <div class="hint" id="hintBox">
          <div class="hint-title" id="hintTitle">看小圆点来想一想</div>
          <div id="hintDots"></div>
        </div>
      </div>

      <aside class="side" aria-label="练习记录">
        <div class="task-box">
          <div class="task-head">
            <span>今日任务</span>
            <span id="taskBadge">0/10</span>
          </div>
          <div class="task-goal">
            <input id="taskGoalInput" type="number" inputmode="numeric" min="1" max="50" value="10" aria-label="每日任务题数">
            <button id="saveTaskButton" type="button">设置</button>
          </div>
          <div class="progress" aria-label="今日任务进度">
            <div class="progress-fill" id="taskProgress"></div>
          </div>
          <p class="task-text" id="taskText">今天答对 10 题就能点亮奖励。</p>
          <div class="checkin-strip" aria-label="打卡统计">
            <div class="checkin-pill">
              <b id="todayCheckin">0</b>
              <span>今日打卡</span>
            </div>
            <div class="checkin-pill">
              <b id="currentStreak">0</b>
              <span>连续天数</span>
            </div>
            <div class="checkin-pill">
              <b id="bestStreak">0</b>
              <span>最长连续</span>
            </div>
          </div>
          <div class="milestones" aria-label="连续打卡奖励">
            <div class="milestone" data-milestone="3">3天<br>柴犬徽章</div>
            <div class="milestone" data-milestone="5">5天<br>动物派对</div>
            <div class="milestone" data-milestone="10">10天<br>森林奖杯</div>
          </div>
        </div>

        <div class="calendar">
          <div class="calendar-head">
            <span id="calendarTitle">本月打卡</span>
            <span id="calendarSummary">0天</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="stats">
          <div class="stat">
            <b id="score">0</b>
            <span>得分</span>
          </div>
          <div class="stat">
            <b id="streak">0</b>
            <span>连对</span>
          </div>
        </div>

        <div class="badge-box">
          <div class="badge-title">星星能量</div>
          <div class="stars" id="stars" aria-label="星星能量">
            <span class="star">1</span>
            <span class="star">2</span>
            <span class="star">3</span>
            <span class="star">4</span>
            <span class="star">5</span>
          </div>
          <p class="next-goal" id="nextGoal">再答对 5 题，点亮一轮星星。</p>
        </div>

        <div class="history">
          <h2>最近5题</h2>
          <div class="history-list" id="historyList"></div>
        </div>
      </aside>
    </section>
  </main>

  <div class="reward" id="reward" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
    <div class="reward-card">
      <div class="reward-stage" aria-hidden="true">
        <span class="reward-sun"></span>
        <span class="reward-animal dog">🐕</span>
        <span class="reward-animal rabbit">🐰</span>
        <span class="reward-animal panda">🐼</span>
        <span class="reward-star">★</span>
        <span class="reward-star">★</span>
      </div>
      <h2 id="rewardTitle">今日任务完成！</h2>
      <p id="rewardText">小动物们一起给佐佐庆祝，今天的数学任务完成了。</p>
      <button type="button" id="rewardClose">继续练习</button>
    </div>
  </div>

  <script>
    const memoryStore = {};
    const storage = {
      getItem(key) {
        try {
          return window.localStorage ? window.localStorage.getItem(key) : memoryStore[key] || null;
        } catch {
          return memoryStore[key] || null;
        }
      },
      setItem(key, value) {
        try {
          if (window.localStorage) {
            window.localStorage.setItem(key, value);
            return;
          }
        } catch {
          // Fall back to memory storage when a browser blocks localStorage.
        }
        memoryStore[key] = value;
      }
    };

    const difficultySettings = {
      easy: {
        max: 10,
        label: "启航",
        kinds: ["normal", "missing", "story"]
      },
      medium: {
        max: 20,
        label: "巡航",
        kinds: ["normal", "missing", "compare", "story"]
      },
      hard: {
        max: 40,
        label: "冲刺",
        kinds: ["normal", "missing", "compare", "story", "chain"]
      }
    };

    const kindLabels = {
      normal: "普通算式",
      missing: "找缺口",
      compare: "比大小",
      story: "故事题",
      chain: "连环算式"
    };

    const encouragements = [
      "太棒了，柴犬队长给你点头。",
      "这题答得很稳，小兔子都跳起来了。",
      "漂亮，数字朋友排队鼓掌。",
      "佐佐的脑筋转得真快。",
      "很好，继续保持这股劲。",
      "小熊猫说：这个答案真准。",
      "又解开一颗数学星星。",
      "认真思考的样子很厉害。",
      "这一步算得清清楚楚。",
      "小动物们已经准备好下一题了。"
    ];

    const state = {
      mode: "mix",
      difficulty: "easy",
      kind: "mix",
      max: 10,
      score: 0,
      streak: 0,
      completed: 0,
      attempts: 0,
      history: [],
      problem: null,
      task: null,
      checkins: [],
      streakRewards: {},
      rewardQueue: [],
      rewardActive: false,
      lastEncouragement: ""
    };

    const els = {
      problemText: document.querySelector("#problemText"),
      typePill: document.querySelector("#typePill"),
      input: document.querySelector("#answerInput"),
      check: document.querySelector("#checkButton"),
      hint: document.querySelector("#hintButton"),
      feedback: document.querySelector("#feedback"),
      pad: document.querySelector("#numberPad"),
      hintBox: document.querySelector("#hintBox"),
      hintTitle: document.querySelector("#hintTitle"),
      hintDots: document.querySelector("#hintDots"),
      score: document.querySelector("#score"),
      streak: document.querySelector("#streak"),
      stars: document.querySelectorAll(".star"),
      nextGoal: document.querySelector("#nextGoal"),
      history: document.querySelector("#historyList"),
      modeButtons: document.querySelectorAll("[data-mode]"),
      difficultyButtons: document.querySelectorAll("[data-difficulty]"),
      kindButtons: document.querySelectorAll("[data-kind]"),
      taskBadge: document.querySelector("#taskBadge"),
      taskGoalInput: document.querySelector("#taskGoalInput"),
      saveTask: document.querySelector("#saveTaskButton"),
      taskProgress: document.querySelector("#taskProgress"),
      taskText: document.querySelector("#taskText"),
      todayCheckin: document.querySelector("#todayCheckin"),
      currentStreak: document.querySelector("#currentStreak"),
      bestStreak: document.querySelector("#bestStreak"),
      milestones: document.querySelectorAll("[data-milestone]"),
      calendarTitle: document.querySelector("#calendarTitle"),
      calendarSummary: document.querySelector("#calendarSummary"),
      calendarGrid: document.querySelector("#calendarGrid"),
      reward: document.querySelector("#reward"),
      rewardTitle: document.querySelector("#rewardTitle"),
      rewardText: document.querySelector("#rewardText"),
      rewardClose: document.querySelector("#rewardClose")
    };

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickEncouragement() {
      let next = encouragements[randomInt(0, encouragements.length - 1)];
      for (let i = 0; next === state.lastEncouragement && i < 6; i += 1) {
        next = encouragements[randomInt(0, encouragements.length - 1)];
      }
      state.lastEncouragement = next;
      return next;
    }

    function todayKey() {
      return dateKey(new Date());
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function loadTask() {
      const savedGoal = Number(storage.getItem("zuozuoDailyGoal")) || 10;
      const date = todayKey();
      const saved = JSON.parse(storage.getItem("zuozuoDailyTask") || "null");
      state.checkins = JSON.parse(storage.getItem("zuozuoCheckins") || "[]");
      state.streakRewards = JSON.parse(storage.getItem("zuozuoStreakRewards") || "{}");

      if (saved && saved.date === date) {
        state.task = {
          date,
          goal: saved.goal || savedGoal,
          done: saved.done || 0,
          rewarded: Boolean(saved.rewarded)
        };
      } else {
        state.task = { date, goal: savedGoal, done: 0, rewarded: false };
      }

      els.taskGoalInput.value = state.task.goal;
      if (state.task.done >= state.task.goal) {
        markTodayComplete();
      }
      saveTask();
      renderTask();
      renderCheckin();
      renderCalendar();
    }

    function saveTask() {
      storage.setItem("zuozuoDailyGoal", String(state.task.goal));
      storage.setItem("zuozuoDailyTask", JSON.stringify(state.task));
      storage.setItem("zuozuoCheckins", JSON.stringify(state.checkins));
      storage.setItem("zuozuoStreakRewards", JSON.stringify(state.streakRewards));
    }

    function makeProblem() {
      const op = state.mode === "mix"
        ? (Math.random() > 0.5 ? "add" : "sub")
        : state.mode;

      const allowedKinds = difficultySettings[state.difficulty].kinds;
      const kind = state.kind === "mix"
        ? allowedKinds[randomInt(0, allowedKinds.length - 1)]
        : state.kind;

      if (kind === "compare") return makeCompareProblem(op);
      if (kind === "story") return makeStoryProblem(op);
      if (kind === "chain") return makeChainProblem();
      if (kind === "missing") return makeMissingProblem(op);
      return makeNormalProblem(op);
    }

    function makeBaseNumbers(op) {
      if (op === "add") {
        const left = randomInt(1, state.max - 1);
        const right = randomInt(1, state.max - left);
        return { left, right, operator: "+", answer: left + right };
      }

      const left = randomInt(1, state.max);
      const right = randomInt(1, left);
      return { left, right, operator: "-", answer: left - right };
    }

    function makeNormalProblem(op) {
      const base = makeBaseNumbers(op);
      return {
        ...base,
        kind: "normal",
        answerType: "number",
        prompt: `${base.left} ${base.operator} ${base.right} = ?`,
        html: `<span>${base.left}</span><span>${base.operator}</span><span>${base.right}</span><span>=</span><span>?</span>`
      };
    }

    function makeMissingProblem(op) {
      const base = makeBaseNumbers(op);
      const missingSide = randomInt(0, 1) === 0 ? "left" : "right";
      const answer = base[missingSide];
      const left = missingSide === "left" ? `<span class="blank">?</span>` : `<span>${base.left}</span>`;
      const right = missingSide === "right" ? `<span class="blank">?</span>` : `<span>${base.right}</span>`;

      return {
        ...base,
        kind: "missing",
        answer,
        answerType: "number",
        prompt: `${missingSide === "left" ? "?" : base.left} ${base.operator} ${missingSide === "right" ? "?" : base.right} = ${base.answer}`,
        html: `${left}<span>${base.operator}</span>${right}<span>=</span><span>${base.answer}</span>`
      };
    }

    function makeCompareProblem(op) {
      const first = makeBaseNumbers(op).answer;
      const secondOp = state.mode === "mix" ? (Math.random() > 0.5 ? "add" : "sub") : op;
      const second = makeBaseNumbers(secondOp).answer;
      const answer = first > second ? ">" : first < second ? "<" : "=";

      return {
        kind: "compare",
        answer,
        answerType: "symbol",
        prompt: `${first} ? ${second}`,
        html: `<span>${first}</span><span class="blank">?</span><span>${second}</span>`,
        hintText: `${first} 和 ${second} 谁更大？一样大就选 =。`
      };
    }

    function makeStoryProblem(op) {
      const base = makeBaseNumbers(op);
      const addStories = [
        `火箭已经收集了 ${base.left} 颗星星，又找到 ${base.right} 颗，现在一共有几颗？`,
        `小积木塔有 ${base.left} 块，再放上 ${base.right} 块，一共有几块？`
      ];
      const subStories = [
        `佐佐有 ${base.left} 个数字贴纸，送给朋友 ${base.right} 个，还剩几个？`,
        `小火箭带了 ${base.left} 颗能量豆，用掉 ${base.right} 颗，还剩几颗？`
      ];
      const pool = base.operator === "+" ? addStories : subStories;
      const story = pool[randomInt(0, pool.length - 1)];

      return {
        ...base,
        kind: "story",
        answerType: "number",
        prompt: story,
        html: story
      };
    }

    function makeChainProblem() {
      const first = randomInt(2, Math.min(24, state.max - 2));
      const second = randomInt(1, Math.min(12, state.max - first));
      const subtotal = first + second;
      const third = randomInt(1, Math.min(12, subtotal));
      const answer = subtotal - third;

      return {
        kind: "chain",
        answer,
        answerType: "number",
        left: first,
        right: second,
        third,
        operator: "+",
        prompt: `${first} + ${second} - ${third} = ?`,
        html: `<span>${first}</span><span>+</span><span>${second}</span><span>−</span><span>${third}</span><span>=</span><span>?</span>`,
        hintText: `先算 ${first} + ${second}，再减 ${third}。`
      };
    }

    function nextProblem() {
      let next = makeProblem();
      const current = state.problem;

      for (let i = 0; current && i < 8; i += 1) {
        const same = next.prompt === current.prompt;
        if (!same) break;
        next = makeProblem();
      }

      state.problem = next;
      state.attempts = 0;
      els.typePill.textContent = `${difficultySettings[state.difficulty].label} · ${kindLabels[next.kind]}`;
      els.problemText.className = `problem ${next.kind === "story" ? "story" : ""}`;
      els.problemText.innerHTML = next.html;
      els.input.value = "";
      els.input.setAttribute("inputmode", next.answerType === "symbol" ? "text" : "numeric");
      els.feedback.className = "feedback";
      els.feedback.textContent = "这一题是多少？";
      els.hintBox.classList.remove("is-visible");
      renderPad();
      els.input.focus();
    }

    function renderPad() {
      els.pad.innerHTML = "";
      const padMax = state.problem && state.problem.answerType === "number"
        ? Math.max(state.max, state.problem.answer)
        : state.max;
      const choices = state.problem && state.problem.answerType === "symbol"
        ? [">", "=", "<"]
        : Array.from({ length: padMax + 1 }, (_, index) => index);

      choices.forEach((choice) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => {
          els.input.value = choice;
          checkAnswer();
        });
        els.pad.appendChild(button);
      });
    }

    function renderStats() {
      els.score.textContent = state.score;
      els.streak.textContent = state.streak;

      const litCount = state.streak % 5 || (state.streak > 0 ? 5 : 0);
      els.stars.forEach((star, index) => {
        star.classList.toggle("is-lit", index < litCount);
      });

      const left = 5 - (state.streak % 5 || (state.streak > 0 ? 5 : 0));
      els.nextGoal.textContent = left === 0
        ? "星星满格，下一题继续保持。"
        : `再答对 ${left} 题，点亮一轮星星。`;
    }

    function renderTask() {
      const done = Math.min(state.task.done, state.task.goal);
      const percent = Math.round((done / state.task.goal) * 100);
      els.taskBadge.textContent = `${done}/${state.task.goal}`;
      els.taskProgress.style.width = `${percent}%`;
      els.taskText.textContent = done >= state.task.goal
        ? "今日任务完成，日历已经打卡。"
        : `今天再答对 ${state.task.goal - done} 题，就能完成打卡。`;
    }

    function getCheckinSet() {
      return new Set(state.checkins);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function computeCurrentStreak() {
      const done = getCheckinSet();
      let cursor = new Date();
      let streak = 0;

      while (done.has(dateKey(cursor))) {
        streak += 1;
        cursor = addDays(cursor, -1);
      }

      return streak;
    }

    function computeBestStreak() {
      const sorted = [...getCheckinSet()].sort();
      let best = 0;
      let run = 0;
      let previous = null;

      sorted.forEach((key) => {
        const current = new Date(`${key}T00:00:00`);
        const expected = previous ? dateKey(addDays(previous, 1)) : null;
        run = expected === key ? run + 1 : 1;
        best = Math.max(best, run);
        previous = current;
      });

      return best;
    }

    function renderCheckin() {
      const today = todayKey();
      const current = computeCurrentStreak();
      const best = computeBestStreak();
      els.todayCheckin.textContent = getCheckinSet().has(today) ? "✓" : "0";
      els.currentStreak.textContent = current;
      els.bestStreak.textContent = best;

      els.milestones.forEach((item) => {
        const days = Number(item.dataset.milestone);
        item.classList.toggle("is-done", current >= days);
      });
    }

    function renderCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const done = getCheckinSet();
      const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
      const monthDone = [...done].filter((key) => {
        const date = new Date(`${key}T00:00:00`);
        return date.getFullYear() === year && date.getMonth() === month;
      }).length;

      els.calendarTitle.textContent = `${year}年${month + 1}月`;
      els.calendarSummary.textContent = `${monthDone}天`;
      els.calendarGrid.innerHTML = "";

      weekNames.forEach((name) => {
        const cell = document.createElement("div");
        cell.className = "calendar-cell weekday";
        cell.textContent = name;
        els.calendarGrid.appendChild(cell);
      });

      for (let i = 0; i < first.getDay(); i += 1) {
        const cell = document.createElement("div");
        cell.className = "calendar-cell";
        cell.textContent = "";
        els.calendarGrid.appendChild(cell);
      }

      for (let day = 1; day <= last.getDate(); day += 1) {
        const date = new Date(year, month, day);
        const key = dateKey(date);
        const cell = document.createElement("div");
        cell.className = "calendar-cell";
        cell.textContent = done.has(key) ? "✓" : day;
        cell.classList.toggle("is-today", key === todayKey());
        cell.classList.toggle("is-done", done.has(key));
        els.calendarGrid.appendChild(cell);
      }
    }

    function markTodayComplete() {
      const today = todayKey();
      if (!getCheckinSet().has(today)) {
        state.checkins.push(today);
        state.checkins = [...new Set(state.checkins)].sort();
      }

      renderCheckin();
      renderCalendar();
      saveTask();

      return computeCurrentStreak();
    }

    function renderHistory() {
      els.history.innerHTML = "";
      state.history.slice(0, 5).forEach((item) => {
        const row = document.createElement("div");
        row.className = `history-item ${item.correct ? "good" : "try"}`;
        row.innerHTML = `<span>${item.text}</span><span>${item.correct ? "对" : "再练"}</span>`;
        els.history.appendChild(row);
      });
    }

    function remember(correct, typed) {
      const p = state.problem;
      const text = p.prompt.includes("?")
        ? p.prompt.replace("?", typed)
        : `${p.prompt} 答案：${typed}`;
      state.history.unshift({
        correct,
        text
      });
      state.history = state.history.slice(0, 5);
      renderHistory();
    }

    function checkAnswer() {
      const raw = els.input.value.trim();
      if (raw === "") {
        els.feedback.className = "feedback try";
        els.feedback.textContent = "先选一个数字。";
        return;
      }

      const typed = state.problem.answerType === "symbol" ? raw : Number(raw);
      if (state.problem.answerType === "number") {
        const answerMax = Math.max(state.max, state.problem.answer);
        if (!Number.isInteger(typed) || typed < 0 || typed > answerMax) {
          els.feedback.className = "feedback try";
          els.feedback.textContent = `答案在 0 到 ${answerMax} 之间。`;
          return;
        }
      } else if (![">", "<", "="].includes(raw)) {
        els.feedback.className = "feedback try";
        els.feedback.textContent = "请选择 >、< 或 =。";
        return;
      }

      if (typed === state.problem.answer) {
        const points = state.attempts === 0 ? 10 : 5;
        state.score += points;
        state.streak += 1;
        state.completed += 1;
        state.task.done += 1;
        remember(true, typed);
        renderStats();
        renderTask();
        saveTask();
        els.feedback.className = "feedback good";
        els.feedback.textContent = `${pickEncouragement()} 加 ${points} 分。`;
        maybeShowPracticeReward();
        maybeShowReward();
        window.setTimeout(nextProblem, 700);
        return;
      }

      state.attempts += 1;
      state.streak = 0;
      remember(false, typed);
      renderStats();
      els.feedback.className = "feedback try";
      els.feedback.textContent = "差一点，再想一想。";
      showHint();
      els.input.select();
    }

    function maybeShowPracticeReward() {
      if (state.completed > 0 && state.completed % 10 === 0) {
        showReward("ten");
      }

      if (state.streak > 0 && state.streak % 5 === 0) {
        showReward("combo");
      }
    }

    function maybeShowReward() {
      if (state.task.done < state.task.goal || state.task.rewarded) return;
      state.task.rewarded = true;
      const streak = markTodayComplete();
      saveTask();
      renderTask();
      const milestone = [10, 5, 3].find((days) => streak >= days && !state.streakRewards[`${todayKey()}-${days}`]);
      if (milestone) {
        state.streakRewards[`${todayKey()}-${milestone}`] = true;
        saveTask();
        showReward("streak", milestone);
        return;
      }
      showReward("daily");
    }

    function showReward(type = "daily", days = 0) {
      if (state.rewardActive) {
        state.rewardQueue.push({ type, days });
        return;
      }

      state.rewardActive = true;
      els.reward.dataset.reward = type;

      if (type === "streak") {
        const names = {
          3: ["连续3天打卡！", "柴犬队长送来勇气徽章，佐佐的坚持开始发光了。"],
          5: ["连续5天打卡！", "小动物朋友开派对，大家一起为佐佐跳庆祝舞。"],
          10: ["连续10天打卡！", "森林数学奖杯点亮了，佐佐已经很会坚持了。"]
        };
        els.rewardTitle.textContent = names[days][0];
        els.rewardText.textContent = names[days][1];
      } else if (type === "ten") {
        els.rewardTitle.textContent = "已经完成10道题！";
        els.rewardText.textContent = "柴犬领着小动物巡游，给佐佐送来十题勇士奖章。";
      } else if (type === "combo") {
        els.rewardTitle.textContent = "连续答对5道题！";
        els.rewardText.textContent = "小动物们一起蹦蹦跳跳，庆祝佐佐的连对能量满格。";
      } else {
        els.rewardTitle.textContent = "今日任务完成！";
        els.rewardText.textContent = "柴犬、兔子和熊猫一起跳舞，庆祝佐佐完成今天的数学打卡。";
      }

      els.reward.classList.add("is-visible");
      makeConfetti();
    }

    function makeConfetti() {
      const colors = ["#ff7a66", "#ffd166", "#2f9e6d", "#3777c8", "#8b5cf6", "#ff8cc6"];
      for (let i = 0; i < 42; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${randomInt(5, 95)}vw`;
        piece.style.background = colors[randomInt(0, colors.length - 1)];
        piece.style.animationDelay = `${Math.random() * 0.45}s`;
        piece.style.transform = `rotate(${randomInt(0, 180)}deg)`;
        document.body.appendChild(piece);
        window.setTimeout(() => piece.remove(), 4800);
      }
    }

    function makeDots(count, className = "") {
      const row = document.createElement("div");
      row.className = "dot-row";
      for (let i = 0; i < count; i += 1) {
        const dot = document.createElement("span");
        dot.className = `dot ${className}`.trim();
        row.appendChild(dot);
      }
      return row;
    }

    function showHint() {
      const p = state.problem;
      els.hintDots.innerHTML = "";

      if (p.kind === "compare" || p.kind === "chain") {
        els.hintTitle.textContent = p.hintText;
        els.hintBox.classList.add("is-visible");
        return;
      }

      els.hintTitle.textContent = p.operator === "+"
        ? `${p.left} 个蓝点，再加 ${p.right} 个绿点`
        : `${p.left} 个蓝点，划掉 ${p.right} 个`;

      if (p.operator === "+") {
        els.hintDots.appendChild(makeDots(p.left));
        els.hintDots.appendChild(makeDots(p.right, "added"));
      } else {
        const row = document.createElement("div");
        row.className = "dot-row";
        for (let i = 0; i < p.left; i += 1) {
          const dot = document.createElement("span");
          dot.className = i < p.right ? "dot taken" : "dot";
          row.appendChild(dot);
        }
        els.hintDots.appendChild(row);
      }

      els.hintBox.classList.add("is-visible");
    }

    els.check.addEventListener("click", checkAnswer);
    els.hint.addEventListener("click", showHint);
    els.input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkAnswer();
    });
    els.rewardClose.addEventListener("click", () => {
      els.reward.classList.remove("is-visible");
      state.rewardActive = false;
      const nextReward = state.rewardQueue.shift();
      if (nextReward) {
        window.setTimeout(() => showReward(nextReward.type, nextReward.days), 120);
        return;
      }
      els.input.focus();
    });
    els.saveTask.addEventListener("click", () => {
      const nextGoal = Math.max(1, Math.min(50, Number(els.taskGoalInput.value) || 10));
      state.task.goal = nextGoal;
      state.task.rewarded = state.task.done >= nextGoal ? state.task.rewarded : false;
      els.taskGoalInput.value = nextGoal;
      saveTask();
      renderTask();
      renderCheckin();
      renderCalendar();
      if (state.task.done >= state.task.goal && !state.task.rewarded) maybeShowReward();
    });

    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        els.modeButtons.forEach((item) => {
          item.classList.toggle("is-active", item === button);
        });
        nextProblem();
      });
    });

    els.difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.difficulty = button.dataset.difficulty;
        state.max = difficultySettings[state.difficulty].max;
        els.difficultyButtons.forEach((item) => {
          item.classList.toggle("is-active", item === button);
        });
        nextProblem();
      });
    });

    els.kindButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.kind = button.dataset.kind;
        els.kindButtons.forEach((item) => {
          item.classList.toggle("is-active", item === button);
        });
        nextProblem();
      });
    });

    loadTask();
    renderStats();
    nextProblem();
  </script>
</body>
</html>
